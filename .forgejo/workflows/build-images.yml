name: Build & Push Images

on:
  push:
    branches: [master]
    paths:
      - 'mcp-server/**'
      - 'ingestion/**'
      - 'reranker/**'
      - 'pb-proxy/**'
      - 'shared/**'
      - 'init-db/**'
      - 'opa-policies/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: baumeister-runner
    steps:
      - name: Detect and build changed images
        run: |
          export REPO_DIR="$GITHUB_WORKSPACE"
          cd "$REPO_DIR"
          bash scripts/build-images.sh
