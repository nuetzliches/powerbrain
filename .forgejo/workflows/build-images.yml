name: Build, Push & Deploy

on:
  push:
    branches: [master]
    paths:
      - 'mcp-server/**'
      - 'ingestion/**'
      - 'reranker/**'
      - 'pb-proxy/**'
      - 'shared/**'
      - 'init-db/**'
      - 'opa-policies/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: baumeister-runner
    steps:
      - name: Checkout repository
        run: |
          git clone --depth 2 --branch master \
            "https://oauth2:${GITHUB_TOKEN}@git.nuetzliche.it/nuts/powerbrain.git" workspace
          cd workspace

      - name: Login to Forgejo Registry
        run: |
          echo "${REGISTRY_PASSWORD}" | docker login git.nuetzliche.it -u "${REGISTRY_USER}" --password-stdin
        env:
          REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Detect and build changed images
        run: |
          cd workspace
          bash scripts/build-images.sh
        env:
          FORCE_BUILD: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}

      - name: Trigger deploy via nuts-infra
        run: |
          curl -sf -X POST \
            "https://git.nuetzliche.it/api/v1/repos/nuts/nuts-infra/dispatches" \
            -H "Authorization: token ${DEPLOY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"event_type":"powerbrain-updated"}'
          echo "✅ Deploy dispatch sent to nuts-infra"
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
