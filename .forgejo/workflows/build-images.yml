name: Build, Push & Deploy

on:
  push:
    branches: [master]
    paths:
      - 'mcp-server/**'
      - 'ingestion/**'
      - 'reranker/**'
      - 'pb-proxy/**'
      - 'shared/**'
      - 'init-db/**'
      - 'opa-policies/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: baumeister-runner
    steps:
      - name: Checkout repository
        run: |
          git clone --depth 2 --branch master \
            "https://oauth2:${GITHUB_TOKEN}@git.nuetzliche.it/nuts/powerbrain.git" workspace
          cd workspace

      - name: Login to Forgejo Registry
        run: |
          echo "${REGISTRY_PASSWORD}" | docker login git.nuetzliche.it -u "${REGISTRY_USER}" --password-stdin
        env:
          REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Detect and build changed images
        run: |
          cd workspace
          bash scripts/build-images.sh
        env:
          REGISTRY: git.nuetzliche.it
          ORG: nuts
          REPO: powerbrain
          FORCE_BUILD: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}

      - name: Trigger deploy via nuts-infra
        run: |
          AUTH=$(printf '%s:%s' "${REGISTRY_USER}" "${REGISTRY_PASSWORD}" | busybox base64)
          wget -q --post-data='{"ref":"main"}' \
            --header="Content-Type: application/json" \
            --header="Authorization: Basic ${AUTH}" \
            -O- "https://git.nuetzliche.it/api/v1/repos/nuts/nuts-infra/actions/workflows/rebuild-powerbrain.yml/dispatches"
          echo "✅ Deploy dispatch sent to nuts-infra"
        env:
          REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
