name: Build & Push Images

on:
  push:
    branches: [master]
    paths:
      - 'mcp-server/**'
      - 'ingestion/**'
      - 'reranker/**'
      - 'pb-proxy/**'
      - 'shared/**'
      - 'init-db/**'
      - 'opa-policies/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: baumeister-runner
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect and build changed images
        run: bash scripts/build-images.sh
