version: "3.9"

# ============================================================
#  Self-Hosted Wissensdatenbank – Docker Compose
#  Komponenten: Qdrant, PostgreSQL, OPA, Ollama, MCP-Server,
#               Ingestion, Reranker, Prometheus, Grafana,
#               Grafana Tempo (Tracing), postgres-exporter
# ============================================================

networks:
  pb-net:
    driver: bridge

volumes:
  qdrant_data:
  pg_data:
  ollama_data:
  prometheus_data:
  grafana_data:
  tempo_data:
  caddy_data:
  caddy_config:
  vllm_models:
  tei_models:

secrets:
  pg_password:
    file: ./secrets/pg_password.txt
  vault_hmac_secret:
    file: ./secrets/vault_hmac_secret.txt
  forgejo_token:
    file: ./secrets/forgejo_token.txt
  github_pat:
    file: ./secrets/github_pat.txt
  anthropic_api_key:
    file: ./secrets/anthropic_api_key.txt
  mcp_auth_token:
    file: ./secrets/mcp_auth_token.txt

services:

  # ── Qdrant (Vektordatenbank) ──────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: pb-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    networks:
      - pb-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── PostgreSQL + Apache AGE ───────────────────────────────
  postgres:
    image: apache/age:release_PG16_1.6.0
    container_name: pb-postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    secrets:
      - pg_password
    environment:
      POSTGRES_DB: powerbrain
      POSTGRES_USER: pb_admin
      POSTGRES_PASSWORD_FILE: /run/secrets/pg_password
    networks:
      - pb-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pb_admin -d powerbrain"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── postgres-exporter (Prometheus Metriken für PG) ────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: pb-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://pb_admin:${PG_PASSWORD:-changeme_in_production}@postgres:5432/powerbrain?sslmode=disable"
    networks:
      - pb-net
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Open Policy Agent ─────────────────────────────────────
  opa:
    image: openpolicyagent/opa:latest
    container_name: pb-opa
    ports:
      - "8181:8181"
    volumes:
      - ./opa-policies:/policies:ro
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--set=decision_logs.console=true"
      - "/policies"
      # Bundle-Polling nach Setup aktivieren:
      # - "--set=services.forgejo.url=${FORGEJO_URL:-http://forgejo.local:3000}"
      # - "--set=services.forgejo.credentials.bearer.token=${FORGEJO_TOKEN}"
      # - "--set=bundles.pb.service=forgejo"
      # - "--set=bundles.pb.resource=/api/v1/repos/pb-org/pb-policies/raw/bundle.tar.gz"
      # - "--set=bundles.pb.polling.min_delay_seconds=10"
    networks:
      - pb-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/opa", "eval", "true"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Ollama (Embeddings) ───────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: pb-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - pb-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # GPU-Support (deaktiviert – NVIDIA Container Toolkit nicht verfügbar)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ── Reranker (Cross-Encoder) ──────────────────────────────
  reranker:
    build:
      context: ./reranker
      dockerfile: Dockerfile
    container_name: pb-reranker
    ports:
      - "8082:8082"
    environment:
      RERANKER_MODEL: cross-encoder/ms-marco-MiniLM-L-6-v2
      RERANKER_MAX_BATCH: "128"
      RERANKER_DEFAULT_TOP_N: "10"
      OTEL_ENABLED:    ${OTEL_ENABLED:-true}
      OTLP_ENDPOINT:   http://tempo:4317
      TELEMETRY_IN_RESPONSE: ${TELEMETRY_IN_RESPONSE:-true}
    networks:
      - pb-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── MCP-Server (Agenten-Schnittstelle) ────────────────────
  mcp-server:
    build:
      context: .
      dockerfile: mcp-server/Dockerfile
    container_name: pb-mcp-server
    ports:
      - "8080:8080"   # MCP Streamable HTTP
      - "9091:9091"   # Prometheus /metrics
    secrets:
      - pg_password
      - vault_hmac_secret
      - forgejo_token
    environment:
      QDRANT_URL:      http://qdrant:6333
      POSTGRES_HOST:   postgres
      POSTGRES_PORT:   "5432"
      POSTGRES_USER:   pb_admin
      POSTGRES_DB:     powerbrain
      POSTGRES_PASSWORD_FILE: /run/secrets/pg_password
      OPA_URL:         http://opa:8181
      OLLAMA_URL:      http://ollama:11434
      EMBEDDING_PROVIDER_URL: ${EMBEDDING_PROVIDER_URL:-http://ollama:11434}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-embed-text}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      LLM_PROVIDER_URL: ${LLM_PROVIDER_URL:-http://ollama:11434}
      LLM_MODEL:       ${LLM_MODEL:-qwen2.5:3b}
      LLM_API_KEY:     ${LLM_API_KEY:-}
      FORGEJO_URL:     ${FORGEJO_URL:-http://forgejo.local:3000}
      FORGEJO_TOKEN_FILE: /run/secrets/forgejo_token
      VAULT_HMAC_SECRET_FILE: /run/secrets/vault_hmac_secret
      RERANKER_URL:    http://reranker:8082
      RERANKER_ENABLED: "true"
      AUTH_REQUIRED:   ${AUTH_REQUIRED:-true}
      MCP_HOST:        0.0.0.0
      MCP_PORT:        "8080"
      MCP_PATH:        /mcp
      METRICS_PORT:    "9091"
      OTEL_ENABLED:    ${OTEL_ENABLED:-true}
      OTLP_ENDPOINT:   http://tempo:4317
      TELEMETRY_IN_RESPONSE: ${TELEMETRY_IN_RESPONSE:-true}
      SUMMARIZATION_ENABLED: ${SUMMARIZATION_ENABLED:-true}
      EMBEDDING_CACHE_SIZE: ${EMBEDDING_CACHE_SIZE:-2048}
      EMBEDDING_CACHE_TTL: ${EMBEDDING_CACHE_TTL:-3600}
      EMBEDDING_CACHE_ENABLED: ${EMBEDDING_CACHE_ENABLED:-true}
      OPA_CACHE_TTL: ${OPA_CACHE_TTL:-60}
      OPA_CACHE_ENABLED: ${OPA_CACHE_ENABLED:-true}
      PG_POOL_MIN: ${PG_POOL_MIN:-2}
      PG_POOL_MAX: ${PG_POOL_MAX:-10}
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
      opa:
        condition: service_healthy
    networks:
      - pb-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Ingestion Pipeline ────────────────────────────────────
  ingestion:
    build:
      context: .
      dockerfile: ingestion/Dockerfile
    container_name: pb-ingestion
    ports:
      - "8081:8081"
    secrets:
      - pg_password
      - forgejo_token
    environment:
      QDRANT_URL:    http://qdrant:6333
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: pb_admin
      POSTGRES_DB:   powerbrain
      POSTGRES_PASSWORD_FILE: /run/secrets/pg_password
      OPA_URL:       http://opa:8181
      OLLAMA_URL:    http://ollama:11434
      EMBEDDING_PROVIDER_URL: ${EMBEDDING_PROVIDER_URL:-http://ollama:11434}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-embed-text}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      FORGEJO_URL:   ${FORGEJO_URL:-http://forgejo.local:3000}
      FORGEJO_TOKEN_FILE: /run/secrets/forgejo_token
      RERANKER_URL:  http://reranker:8082
      LLM_PROVIDER_URL: ${LLM_PROVIDER_URL:-http://ollama:11434}
      LLM_MODEL: ${LLM_MODEL:-qwen2.5:3b}
      LAYER_GENERATION_ENABLED: "${LAYER_GENERATION_ENABLED:-true}"
      EMBEDDING_CACHE_SIZE: ${EMBEDDING_CACHE_SIZE:-2048}
      EMBEDDING_CACHE_TTL: ${EMBEDDING_CACHE_TTL:-3600}
      EMBEDDING_CACHE_ENABLED: ${EMBEDDING_CACHE_ENABLED:-true}
      PG_POOL_MIN: ${PG_POOL_MIN:-2}
      PG_POOL_MAX: ${PG_POOL_MAX:-10}
      OTEL_ENABLED:    ${OTEL_ENABLED:-true}
      OTLP_ENDPOINT:   http://tempo:4317
      TELEMETRY_IN_RESPONSE: ${TELEMETRY_IN_RESPONSE:-true}
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - pb-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Prometheus ────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: pb-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerting_rules.yml:/etc/prometheus/alerting_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    networks:
      - pb-net
    restart: unless-stopped

  # ── Grafana ───────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: pb-grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana-dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana-datasources:/etc/grafana/provisioning/datasources:ro
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      PG_PASSWORD: ${PG_PASSWORD:-changeme_in_production}
    networks:
      - pb-net
    restart: unless-stopped
    depends_on:
      - prometheus

  # ── Grafana Tempo (Distributed Tracing) ──────────────────
  tempo:
    image: grafana/tempo:2.7.2
    container_name: pb-tempo
    command: ["-config.file=/etc/tempo/tempo.yml"]
    volumes:
      - ./monitoring/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo_data:/var/tempo
    ports:
      - "4317:4317"   # OTLP gRPC (von Services genutzt)
      - "3200:3200"   # Tempo HTTP API (Grafana Query)
    networks:
      - pb-net
    restart: unless-stopped

  # ── Testdata Seed (nur mit --profile seed) ────────────────
  seed:
    profiles: ["seed"]
    build:
      context: ./testdata
      dockerfile: Dockerfile
    container_name: pb-seed
    environment:
      INGESTION_URL:   http://ingestion:8081
      OLLAMA_URL:      http://ollama:11434
      EMBEDDING_PROVIDER_URL: ${EMBEDDING_PROVIDER_URL:-http://ollama:11434}
      QDRANT_URL:      http://qdrant:6333
      MCP_URL:         http://mcp-server:8080
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-embed-text}
      MAX_WAIT_SECONDS: "180"
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
      opa:
        condition: service_healthy
      ingestion:
        condition: service_started
      ollama:
        condition: service_started
    networks:
      - pb-net
    restart: "no"

  # ── AI Provider Proxy (optional) ──────────────────────────
  pb-proxy:
    profiles: ["proxy"]
    build:
      context: ./pb-proxy
      dockerfile: Dockerfile
    container_name: pb-proxy
    ports:
      - "${PROXY_PORT:-8090}:8090"
    secrets:
      - github_pat
      - anthropic_api_key
      - pg_password
      - mcp_auth_token
    environment:
      MCP_SERVER_URL:          http://mcp-server:8080/mcp
      MCP_AUTH_TOKEN_FILE:     /run/secrets/mcp_auth_token
      OPA_URL:                 http://opa:8181
      LITELLM_CONFIG:          /app/litellm_config.yaml
      PROXY_HOST:              "0.0.0.0"
      PROXY_PORT:              "8090"
      TOOL_REFRESH_INTERVAL:   ${TOOL_REFRESH_INTERVAL:-60}
      MAX_ITERATIONS:          ${MAX_ITERATIONS:-10}
      TOOL_CALL_TIMEOUT:       ${TOOL_CALL_TIMEOUT:-30}
      REQUEST_TIMEOUT:         ${REQUEST_TIMEOUT:-120}
      FAIL_MODE:               ${FAIL_MODE:-closed}
      METRICS_PORT:            "9092"
      INGESTION_URL:           http://ingestion:8081
      PII_SCAN_ENABLED:        ${PII_SCAN_ENABLED:-true}
      PII_SCAN_FORCED:         ${PII_SCAN_FORCED:-false}
      TOOL_INJECTION_ENABLED:  ${TOOL_INJECTION_ENABLED:-true}
      GITHUB_PAT_FILE:         /run/secrets/github_pat
      ANTHROPIC_API_KEY_FILE:  /run/secrets/anthropic_api_key
      AUTH_REQUIRED:           ${AUTH_REQUIRED:-true}
      PG_HOST:                 postgres
      PG_PORT:                 "5432"
      PG_DATABASE:             powerbrain
      PG_USER:                 pb_admin
      PG_PASSWORD_FILE:        /run/secrets/pg_password
      MCP_SERVERS_CONFIG:      /app/mcp_servers.yaml
      OTEL_ENABLED:            ${OTEL_ENABLED:-true}
      OTLP_ENDPOINT:           http://tempo:4317
      TELEMETRY_IN_RESPONSE:   ${TELEMETRY_IN_RESPONSE:-true}
    volumes:
      - ./pb-proxy/litellm_config.yaml:/app/litellm_config.yaml:ro
      - ./pb-proxy/mcp_servers.yaml:/app/mcp_servers.yaml:ro
    depends_on:
      mcp-server:
        condition: service_started
      opa:
        condition: service_healthy
      ingestion:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - pb-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── vLLM (optional, replaces Ollama for LLM/VLM) ──────────
  vllm:
    image: vllm/vllm-openai:latest
    container_name: pb-vllm
    profiles: ["gpu"]
    ports:
      - "8000:8000"
    volumes:
      - vllm_models:/root/.cache/huggingface
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
    command:
      - "--model"
      - "${VLLM_MODEL:-llava-hf/llava-1.5-7b-hf}"
      - "--dtype"
      - "bfloat16"
      - "--max-model-len"
      - "4096"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - pb-net
    restart: unless-stopped

  # ── HF Text Embeddings Inference (optional) ───────────────
  tei:
    image: ghcr.io/huggingface/text-embeddings-inference:latest
    container_name: pb-tei
    profiles: ["gpu"]
    ports:
      - "8010:80"
    volumes:
      - tei_models:/data
    command:
      - "--model-id"
      - "${TEI_MODEL:-nomic-ai/nomic-embed-text-v1}"
      - "--port"
      - "80"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - pb-net
    restart: unless-stopped

  # ── Caddy (TLS Reverse Proxy, optional) ───────────────────
  caddy:
    profiles: ["tls"]
    image: caddy:2-alpine
    container_name: pb-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    networks:
      - pb-net
    restart: unless-stopped
    depends_on:
      - mcp-server
      - ingestion
