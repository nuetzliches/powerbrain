version: "3.9"

# ============================================================
#  Self-hosted knowledge base – Docker Compose
#  Components: Qdrant, PostgreSQL, OPA, Ollama, MCP server,
#              Ingestion, Reranker, Prometheus, Grafana,
#              Grafana Tempo (Tracing), postgres-exporter
# ============================================================

networks:
  pb-net:
    driver: bridge

volumes:
  qdrant_data:
  pg_data:
  ollama_data:
  ollama_summary_data:
  prometheus_data:
  grafana_data:
  tempo_data:
  caddy_data:
  caddy_config:
  vllm_models:
  tei_models:

secrets:
  pg_password:
    file: ./secrets/pg_password.txt
  vault_hmac_secret:
    file: ./secrets/vault_hmac_secret.txt
  forgejo_token:
    file: ./secrets/forgejo_token.txt
  github_pat:
    file: ./secrets/github_pat.txt
  anthropic_api_key:
    file: ./secrets/anthropic_api_key.txt
  mcp_auth_token:
    file: ./secrets/mcp_auth_token.txt

services:

  # ── Qdrant (vector database) ──────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: pb-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    networks:
      - pb-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── PostgreSQL + Apache AGE ───────────────────────────────
  postgres:
    image: apache/age:release_PG16_1.6.0
    container_name: pb-postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    secrets:
      - pg_password
    environment:
      POSTGRES_DB: powerbrain
      POSTGRES_USER: pb_admin
      POSTGRES_PASSWORD_FILE: /run/secrets/pg_password
    networks:
      - pb-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pb_admin -d powerbrain"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── postgres-exporter (Prometheus metrics for PG) ─────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: pb-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://pb_admin:${PG_PASSWORD:-changeme_in_production}@postgres:5432/powerbrain?sslmode=disable"
    networks:
      - pb-net
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Open Policy Agent ─────────────────────────────────────
  opa:
    image: openpolicyagent/opa:latest
    container_name: pb-opa
    ports:
      - "8181:8181"
    volumes:
      - ./opa-policies:/policies:ro
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--set=decision_logs.console=true"
      # `data.json` lives in `/policies/` (not in the `pb/` subdirectory)
      # so it loads at `data` root — the file's own `{"pb": {"config": ...}}`
      # structure then matches the `data.pb.config.*` paths used by the Rego
      # rules. A data.json inside /policies/pb/ would be merged under
      # data.pb.<content>, yielding data.pb.pb.config (doubly-prefixed).
      - "/policies"
      # For real-time policy sync, use the OPAL profile instead:
      # docker compose --profile opal up -d
    networks:
      - pb-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/opa", "eval", "true"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── OPAL — Real-Time Policy Sync (optional) ──────────────
  # Watches a git repo (Forgejo/GitHub) for policy changes and pushes
  # them to OPA in real-time via WebSocket. Activate with:
  #   docker compose --profile opal up -d
  # Requires OPAL_POLICY_REPO_URL in .env.
  opal-server:
    image: permitio/opal-server:latest
    container_name: pb-opal-server
    profiles: ["opal"]
    ports:
      - "7002:7002"
    environment:
      OPAL_POLICY_REPO_URL: ${OPAL_POLICY_REPO_URL:-}
      OPAL_POLICY_REPO_SSH_KEY: ""
      OPAL_POLICY_REPO_BRANCH: ${OPAL_POLICY_REPO_BRANCH:-main}
      OPAL_POLICY_REPO_POLLING_INTERVAL: ${OPAL_POLL_INTERVAL:-30}
      OPAL_DATA_CONFIG_SOURCES: '{"config":{"entries":[]}}'
      OPAL_LOG_FORMAT_INCLUDE_PID: "true"
    networks:
      - pb-net
    restart: unless-stopped

  opal-client:
    image: permitio/opal-client:latest
    container_name: pb-opal-client
    profiles: ["opal"]
    environment:
      OPAL_SERVER_URL: http://opal-server:7002
      OPAL_OPA_URL: http://opa:8181
      OPAL_LOG_FORMAT_INCLUDE_PID: "true"
    depends_on:
      opa:
        condition: service_healthy
      opal-server:
        condition: service_started
    networks:
      - pb-net
    restart: unless-stopped

  # ── Ollama (embeddings + LLM, local) ──────────────────────
  # Only needed when no external provider is configured.
  # Enable: docker compose --profile local-llm up
  # External providers: set EMBEDDING_PROVIDER_URL + LLM_PROVIDER_URL in .env.
  ollama:
    profiles: ["local-llm"]
    image: ollama/ollama:latest
    container_name: pb-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - pb-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # GPU support (disabled – NVIDIA Container Toolkit not available)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ── Ollama sidecar for summarization (optional) ───────────
  # Dedicated Ollama instance so MCP summarisation never contends
  # with the pb-proxy agent loop. Enable with:
  #   docker compose --profile local-llm --profile summary-llm up -d
  # Then point the MCP server at it:
  #   SUMMARIZATION_PROVIDER_URL=http://ollama-summary:11434
  #   SUMMARIZATION_MODEL=qwen2.5:1.5b
  # See docs/plans/2026-04-20-separate-summary-llm-pool.md.
  ollama-summary:
    profiles: ["summary-llm"]
    image: ollama/ollama:latest
    container_name: pb-ollama-summary
    ports:
      - "11435:11434"
    volumes:
      - ollama_summary_data:/root/.ollama
    networks:
      - pb-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Reranker (Built-in Cross-Encoder) ──────────────────────
  # Only needed when RERANKER_BACKEND=powerbrain (default).
  # Start explicitly: docker compose --profile local-reranker up
  reranker:
    profiles: ["local-reranker"]
    build:
      context: .
      dockerfile: reranker/Dockerfile
    container_name: pb-reranker
    ports:
      - "8082:8082"
    environment:
      RERANKER_MODEL: ${RERANKER_MODEL:-cross-encoder/ms-marco-MiniLM-L-6-v2}
      RERANKER_MAX_BATCH: "128"
      RERANKER_DEFAULT_TOP_N: "10"
      OTEL_ENABLED:    ${OTEL_ENABLED:-true}
      OTLP_ENDPOINT:   http://tempo:4317
      TELEMETRY_IN_RESPONSE: ${TELEMETRY_IN_RESPONSE:-true}
    networks:
      - pb-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── MCP server (agent interface) ──────────────────────────
  mcp-server:
    build:
      context: .
      dockerfile: mcp-server/Dockerfile
    container_name: pb-mcp-server
    ports:
      - "8080:8080"   # MCP Streamable HTTP
      - "9091:9091"   # Prometheus /metrics
    secrets:
      - pg_password
      - vault_hmac_secret
      - forgejo_token
    environment:
      QDRANT_URL:      http://qdrant:6333
      POSTGRES_HOST:   postgres
      POSTGRES_PORT:   "5432"
      POSTGRES_USER:   pb_admin
      POSTGRES_DB:     powerbrain
      POSTGRES_PASSWORD_FILE: /run/secrets/pg_password
      OPA_URL:         http://opa:8181
      OLLAMA_URL:      http://ollama:11434
      EMBEDDING_PROVIDER_URL: ${EMBEDDING_PROVIDER_URL:-http://ollama:11434}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-embed-text}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      LLM_PROVIDER_URL: ${LLM_PROVIDER_URL:-http://ollama:11434}
      LLM_MODEL:       ${LLM_MODEL:-qwen2.5:3b}
      LLM_API_KEY:     ${LLM_API_KEY:-}
      # Optional: route summarization to a dedicated endpoint so it
      # never contends with the pb-proxy agent loop on the same model.
      # Defaults to LLM_* (single-pool) when unset.
      SUMMARIZATION_PROVIDER_URL: ${SUMMARIZATION_PROVIDER_URL:-${LLM_PROVIDER_URL:-http://ollama:11434}}
      SUMMARIZATION_MODEL:        ${SUMMARIZATION_MODEL:-${LLM_MODEL:-qwen2.5:3b}}
      SUMMARIZATION_API_KEY:      ${SUMMARIZATION_API_KEY:-${LLM_API_KEY:-}}
      FORGEJO_URL:     ${FORGEJO_URL:-http://forgejo.local:3000}
      FORGEJO_TOKEN_FILE: /run/secrets/forgejo_token
      VAULT_HMAC_SECRET_FILE: /run/secrets/vault_hmac_secret
      RERANKER_URL:     ${RERANKER_URL:-http://reranker:8082}
      RERANKER_ENABLED: ${RERANKER_ENABLED:-true}
      RERANKER_BACKEND: ${RERANKER_BACKEND:-powerbrain}
      RERANKER_API_KEY: ${RERANKER_API_KEY:-}
      RERANKER_MODEL:   ${RERANKER_MODEL:-}
      AUTH_REQUIRED:   ${AUTH_REQUIRED:-true}
      MCP_HOST:        0.0.0.0
      MCP_PORT:        "8080"
      MCP_PATH:        /mcp
      METRICS_PORT:    "9091"
      OTEL_ENABLED:    ${OTEL_ENABLED:-true}
      OTLP_ENDPOINT:   http://tempo:4317
      TELEMETRY_IN_RESPONSE: ${TELEMETRY_IN_RESPONSE:-true}
      SUMMARIZATION_ENABLED: ${SUMMARIZATION_ENABLED:-true}
      SUMMARIZATION_TIMEOUT: ${SUMMARIZATION_TIMEOUT:-15}
      EMBEDDING_CACHE_SIZE: ${EMBEDDING_CACHE_SIZE:-2048}
      EMBEDDING_CACHE_TTL: ${EMBEDDING_CACHE_TTL:-3600}
      EMBEDDING_CACHE_ENABLED: ${EMBEDDING_CACHE_ENABLED:-true}
      OPA_CACHE_TTL: ${OPA_CACHE_TTL:-60}
      OPA_CACHE_ENABLED: ${OPA_CACHE_ENABLED:-true}
      PG_POOL_MIN: ${PG_POOL_MIN:-2}
      PG_POOL_MAX: ${PG_POOL_MAX:-10}
      PII_CONFIG_PATH: /app/ingestion/pii_config.yaml
      POLICY_SCHEMA_PATH: /app/policy_data_schema.json
    volumes:
      - ./ingestion/pii_config.yaml:/app/ingestion/pii_config.yaml:ro
      - ./opa-policies/policy_data_schema.json:/app/policy_data_schema.json:ro
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
      opa:
        condition: service_healthy
    networks:
      - pb-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Ingestion Pipeline ────────────────────────────────────
  ingestion:
    build:
      context: .
      dockerfile: ingestion/Dockerfile
    container_name: pb-ingestion
    ports:
      - "8081:8081"
    secrets:
      - pg_password
      - forgejo_token
      - github_pat
    volumes:
      - ./ingestion/repos.yaml:/app/ingestion/repos.yaml:ro
    environment:
      QDRANT_URL:    http://qdrant:6333
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: pb_admin
      POSTGRES_DB:   powerbrain
      POSTGRES_PASSWORD_FILE: /run/secrets/pg_password
      OPA_URL:       http://opa:8181
      OLLAMA_URL:    http://ollama:11434
      EMBEDDING_PROVIDER_URL: ${EMBEDDING_PROVIDER_URL:-http://ollama:11434}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-embed-text}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      FORGEJO_URL:   ${FORGEJO_URL:-http://forgejo.local:3000}
      FORGEJO_TOKEN_FILE: /run/secrets/forgejo_token
      GITHUB_PAT_FILE: /run/secrets/github_pat
      RERANKER_URL:  ${RERANKER_URL:-http://reranker:8082}
      LLM_PROVIDER_URL: ${LLM_PROVIDER_URL:-http://ollama:11434}
      LLM_MODEL: ${LLM_MODEL:-qwen2.5:3b}
      LAYER_GENERATION_ENABLED: "${LAYER_GENERATION_ENABLED:-true}"
      EMBEDDING_CACHE_SIZE: ${EMBEDDING_CACHE_SIZE:-2048}
      EMBEDDING_CACHE_TTL: ${EMBEDDING_CACHE_TTL:-3600}
      EMBEDDING_CACHE_ENABLED: ${EMBEDDING_CACHE_ENABLED:-true}
      PG_POOL_MIN: ${PG_POOL_MIN:-2}
      PG_POOL_MAX: ${PG_POOL_MAX:-10}
      OTEL_ENABLED:    ${OTEL_ENABLED:-true}
      OTLP_ENDPOINT:   http://tempo:4317
      TELEMETRY_IN_RESPONSE: ${TELEMETRY_IN_RESPONSE:-true}
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - pb-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Maintenance Worker (B-40 cleanup, B-42 timeouts, B-45 metrics) ─
  pb-worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: pb-worker
    expose:
      - "8083"
    secrets:
      - pg_password
      - github_pat
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: pb_admin
      POSTGRES_DB:   powerbrain
      POSTGRES_PASSWORD_FILE: /run/secrets/pg_password
      OPA_URL:       http://opa:8181
      QDRANT_URL:    http://qdrant:6333
      INGESTION_URL: http://ingestion:8081
      GITHUB_PAT_FILE: /run/secrets/github_pat
      REPO_SYNC_INTERVAL_MINUTES: ${REPO_SYNC_INTERVAL_MINUTES:-5}
      AUDIT_RETENTION_DAYS: ${AUDIT_RETENTION_DAYS:-365}
      PENDING_REVIEW_GRACE_MINUTES: ${PENDING_REVIEW_GRACE_MINUTES:-0}
      PG_POOL_MIN: ${PG_POOL_MIN:-1}
      PG_POOL_MAX: ${PG_POOL_MAX:-3}
      WORKER_METRICS_PORT: "8083"
      LOG_LEVEL: ${WORKER_LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      opa:
        condition: service_started
      ingestion:
        condition: service_started
    networks:
      - pb-net
    restart: unless-stopped

  # ── Prometheus ────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: pb-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerting_rules.yml:/etc/prometheus/alerting_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    networks:
      - pb-net
    restart: unless-stopped

  # ── Grafana ───────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: pb-grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana-dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana-datasources:/etc/grafana/provisioning/datasources:ro
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      PG_PASSWORD: ${PG_PASSWORD:-changeme_in_production}
    networks:
      - pb-net
    restart: unless-stopped
    depends_on:
      - prometheus

  # ── Grafana Tempo (Distributed Tracing) ──────────────────
  tempo:
    image: grafana/tempo:2.7.2
    container_name: pb-tempo
    command: ["-config.file=/etc/tempo/tempo.yml"]
    volumes:
      - ./monitoring/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo_data:/var/tempo
    ports:
      - "4317:4317"   # OTLP gRPC (used by services)
      - "3200:3200"   # Tempo HTTP API (Grafana query)
    networks:
      - pb-net
    restart: unless-stopped

  # ── Testdata seed (only with --profile seed) ─────────────
  seed:
    profiles: ["seed"]
    build:
      context: .
      dockerfile: testdata/Dockerfile
    container_name: pb-seed
    environment:
      INGESTION_URL:   http://ingestion:8081
      OLLAMA_URL:      http://ollama:11434
      EMBEDDING_PROVIDER_URL: ${EMBEDDING_PROVIDER_URL:-http://ollama:11434}
      QDRANT_URL:      http://qdrant:6333
      MCP_URL:         http://mcp-server:8080
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-embed-text}
      MAX_WAIT_SECONDS: "180"
      # Demo profile toggles: set to 1 to include PII fixtures / run graph seed.
      SEED_INCLUDE_PII:   ${SEED_INCLUDE_PII:-0}
      SEED_INCLUDE_GRAPH: ${SEED_INCLUDE_GRAPH:-0}
      MCP_API_KEY:        ${SEED_MCP_API_KEY:-pb_dev_localonly_do_not_use_in_production}
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
      opa:
        condition: service_healthy
      ingestion:
        condition: service_started
    networks:
      - pb-net
    restart: "no"

  # ── Sales-demo UI (only with --profile demo) ─────────────
  # Streamlit app with three panels: role-based search, PII vault reveal,
  # and the knowledge-graph org-chart. Pointed at the live MCP server.
  pb-demo:
    profiles: ["demo"]
    build:
      context: ./demo
      dockerfile: Dockerfile
    container_name: pb-demo
    ports:
      - "${DEMO_PORT:-8095}:8095"
    secrets:
      - vault_hmac_secret
    environment:
      MCP_URL:                http://mcp-server:8080
      INGESTION_URL:          http://ingestion:8081
      # Populated when the `demo` profile brings pb-proxy up alongside;
      # demo/panels/mcp_vs_proxy probes this URL and only renders when
      # the proxy's /health returns an enterprise edition label.
      PROXY_URL:              http://pb-proxy:8090
      PROXY_MODEL:            qwen-local
      DEMO_ANALYST_KEY:       pb_demo_analyst_localonly
      DEMO_VIEWER_KEY:        pb_demo_viewer_localonly
      DEV_ADMIN_KEY:          pb_dev_localonly_do_not_use_in_production
      VAULT_HMAC_SECRET_FILE: /run/secrets/vault_hmac_secret
    depends_on:
      mcp-server:
        condition: service_started
      ingestion:
        condition: service_started
    networks:
      - pb-net
    restart: unless-stopped

  # ── AI Provider Proxy (optional) ──────────────────────────
  pb-proxy:
    # The `demo` profile brings pb-proxy up alongside pb-demo so the
    # "MCP vs Proxy" tab can hit a real enterprise endpoint.
    profiles: ["proxy", "demo"]
    build:
      context: .
      dockerfile: pb-proxy/Dockerfile
    container_name: pb-proxy
    ports:
      - "${PROXY_PORT:-8090}:8090"
    secrets:
      - github_pat
      - anthropic_api_key
      - pg_password
      - mcp_auth_token
    environment:
      MCP_SERVER_URL:          http://mcp-server:8080/mcp
      MCP_AUTH_TOKEN_FILE:     /run/secrets/mcp_auth_token
      OPA_URL:                 http://opa:8181
      LITELLM_CONFIG:          /app/litellm_config.yaml
      PROXY_HOST:              "0.0.0.0"
      PROXY_PORT:              "8090"
      TOOL_REFRESH_INTERVAL:   ${TOOL_REFRESH_INTERVAL:-60}
      MAX_ITERATIONS:          ${MAX_ITERATIONS:-10}
      TOOL_CALL_TIMEOUT:       ${TOOL_CALL_TIMEOUT:-60}
      REQUEST_TIMEOUT:         ${REQUEST_TIMEOUT:-120}
      FAIL_MODE:               ${FAIL_MODE:-closed}
      METRICS_PORT:            "9092"
      INGESTION_URL:           http://ingestion:8081
      PII_SCAN_ENABLED:        ${PII_SCAN_ENABLED:-true}
      PII_SCAN_FORCED:         ${PII_SCAN_FORCED:-false}
      TOOL_INJECTION_ENABLED:  ${TOOL_INJECTION_ENABLED:-true}
      GITHUB_PAT_FILE:         /run/secrets/github_pat
      ANTHROPIC_API_KEY_FILE:  /run/secrets/anthropic_api_key
      AUTH_REQUIRED:           ${AUTH_REQUIRED:-true}
      PG_HOST:                 postgres
      PG_PORT:                 "5432"
      PG_DATABASE:             powerbrain
      PG_USER:                 pb_admin
      PG_PASSWORD_FILE:        /run/secrets/pg_password
      MCP_SERVERS_CONFIG:      /app/mcp_servers.yaml
      OTEL_ENABLED:            ${OTEL_ENABLED:-true}
      OTLP_ENDPOINT:           http://tempo:4317
      TELEMETRY_IN_RESPONSE:   ${TELEMETRY_IN_RESPONSE:-true}
    volumes:
      - ./pb-proxy/litellm_config.yaml:/app/litellm_config.yaml:ro
      - ./pb-proxy/mcp_servers.yaml:/app/mcp_servers.yaml:ro
    depends_on:
      mcp-server:
        condition: service_started
      opa:
        condition: service_healthy
      ingestion:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - pb-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── vLLM (optional, replaces Ollama for LLM/VLM) ──────────
  vllm:
    image: vllm/vllm-openai:latest
    container_name: pb-vllm
    profiles: ["gpu"]
    ports:
      - "8000:8000"
    volumes:
      - vllm_models:/root/.cache/huggingface
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
    command:
      - "--model"
      - "${VLLM_MODEL:-llava-hf/llava-1.5-7b-hf}"
      - "--dtype"
      - "bfloat16"
      - "--max-model-len"
      - "4096"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - pb-net
    restart: unless-stopped

  # ── HF Text Embeddings Inference (optional) ───────────────
  tei:
    image: ghcr.io/huggingface/text-embeddings-inference:latest
    container_name: pb-tei
    profiles: ["gpu"]
    ports:
      - "8010:80"
    volumes:
      - tei_models:/data
    command:
      - "--model-id"
      - "${TEI_MODEL:-nomic-ai/nomic-embed-text-v1}"
      - "--port"
      - "80"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - pb-net
    restart: unless-stopped

  # ── Caddy (TLS Reverse Proxy, optional) ───────────────────
  caddy:
    profiles: ["tls"]
    image: caddy:2-alpine
    container_name: pb-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    networks:
      - pb-net
    restart: unless-stopped
    depends_on:
      - mcp-server
      - ingestion
