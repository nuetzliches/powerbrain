apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    editable: false
    jsonData:
      tracesToLogsV2:
        datasourceUid: Prometheus
      serviceMap:
        datasourceUid: Prometheus
      nodeGraph:
        enabled: true

  - name: PostgreSQL
    type: postgres
    access: proxy
    url: postgres:5432
    user: kb_admin
    editable: false
    jsonData:
      database: knowledgebase
      sslmode: disable
      maxOpenConns: 5
      maxIdleConns: 2
      connMaxLifetime: 14400
    secureJsonData:
      password: $__env{PG_PASSWORD}
