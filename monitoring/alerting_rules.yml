groups:
  - name: pb-alerts
    rules:

      # ── MCP Server ──────────────────────────────────────────

      - alert: HighErrorRate
        expr: rate(pb_mcp_requests_total{status="error"}[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "MCP server error rate above 5%"
          description: "Error rate: {{ $value | humanizePercentage }}"

      - alert: HighSearchLatency
        expr: >
          histogram_quantile(0.95,
            rate(pb_mcp_request_duration_seconds_bucket{tool="search_knowledge"}[10m])
          ) > 2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "search_knowledge p95 latency above 2 seconds"
          description: "p95 latency: {{ $value | humanizeDuration }}"

      - alert: MostToolsDown
        expr: absent(pb_mcp_requests_total)
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "MCP server is not sending metrics"

      # ── Reranker ────────────────────────────────────────────

      - alert: RerankerDown
        expr: up{job="reranker"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Reranker unreachable"

      - alert: HighRerankerFallbackRate
        expr: rate(pb_mcp_rerank_fallback_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Reranker fallback rate elevated (>10% of requests)"

      # ── Retrieval quality ────────────────────────────────────

      - alert: LowSearchQuality
        expr: pb_feedback_avg_rating < 2.5
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "Average feedback rating below 2.5"
          description: "Current value: {{ $value }}"

      # ── Infrastructure ───────────────────────────────────────

      - alert: QdrantDown
        expr: up{job="qdrant"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Qdrant unreachable"

      - alert: PostgresDown
        expr: up{job="postgres"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL unreachable"

      - alert: HighRerankerLatency
        expr: >
          histogram_quantile(0.95,
            rate(pb_reranker_duration_seconds_bucket[5m])
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Reranker p95 latency above 1 second"

      # ── B-45: Accuracy Monitoring (EU AI Act Art. 15) ──────

      - alert: QualityDrift
        expr: avg_over_time(pb_accuracy_avg_rating{window="24h"}[1h]) < 2.5
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Avg feedback rating below 2.5 for {{ $labels.collection }}"
          description: "Rolling-1h avg of pb_accuracy_avg_rating[24h]: {{ $value }}"

      - alert: HighEmptyResultRate
        expr: pb_accuracy_empty_result_rate{window="1h"} > 0.5
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "More than 50% of recent searches returned no results ({{ $labels.collection }})"
          description: "empty_result_rate: {{ $value | humanizePercentage }}"

      - alert: RerankerScoreDrift
        expr: pb_accuracy_rerank_score{window="24h"} < 0.3
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "Average reranker score below 0.3 for {{ $labels.collection }}"
          description: "rerank_score 24h: {{ $value }}"

      - alert: EmbeddingDriftDetected
        expr: pb_accuracy_drift_drifted == 1
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Embedding drift detected on {{ $labels.collection }}"
          description: "Cosine distance from baseline exceeds threshold; investigate model or data shift"
