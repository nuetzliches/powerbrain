name: PR Validate

on:
  pull_request:
    branches: [master]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Run unit tests
        run: |
          docker run --rm -v "${{ github.workspace }}:/app" -w /app python:3.12-slim bash -c "
            pip install --no-cache-dir -q \
              -r requirements-dev.txt \
              -r mcp-server/requirements.txt \
              -r ingestion/requirements.txt \
              -r pb-proxy/requirements.txt \
              -r worker/requirements.txt \
              fastapi uvicorn pydantic prometheus-client pyyaml python-dotenv &&
            PYTHONPATH=.:mcp-server:ingestion:reranker:pb-proxy \
            python -m pytest \
              shared/tests \
              mcp-server/tests \
              ingestion/tests \
              reranker/tests \
              pb-proxy/tests \
              worker/tests \
              -m 'not integration' \
              --tb=short -q \
              --cov=shared --cov=mcp-server --cov=ingestion \
              --cov=reranker --cov=pb-proxy --cov=worker \
              --cov-report=term-missing:skip-covered \
              --cov-fail-under=73
          "

  opa-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download OPA
        run: |
          curl -sSL -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x opa

      - name: Run OPA policy tests
        run: ./opa test opa-policies/pb/ -v

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build mcp-server image
        run: docker build -f mcp-server/Dockerfile -t pb-mcp-server:pr-test .

      - name: Build ingestion image
        run: docker build -f ingestion/Dockerfile -t pb-ingestion:pr-test .

      - name: Build reranker image
        run: docker build -f reranker/Dockerfile -t pb-reranker:pr-test .

      - name: Build pb-proxy image
        run: docker build -f pb-proxy/Dockerfile -t pb-proxy:pr-test .

      - name: Build worker image
        run: docker build -f worker/Dockerfile -t pb-worker:pr-test .

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install scanning tools
        run: pip install pip-audit bandit

      - name: Dependency audit (pip-audit)
        continue-on-error: true
        run: |
          pip-audit -r mcp-server/requirements.txt
          pip-audit -r ingestion/requirements.txt
          pip-audit -r pb-proxy/requirements.txt
          pip-audit -r worker/requirements.txt

      - name: Static security scan (bandit)
        continue-on-error: true
        run: |
          bandit -r shared/ mcp-server/ ingestion/ reranker/ pb-proxy/ worker/ \
            -x '*/tests/*' \
            --severity-level medium \
            -f json -o bandit-report.json || true
          bandit -r shared/ mcp-server/ ingestion/ reranker/ pb-proxy/ worker/ \
            -x '*/tests/*' \
            --severity-level medium

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bandit-report
          path: bandit-report.json
