# LiteLLM Model Configuration for Powerbrain AI Provider Proxy
# Docs: https://docs.litellm.ai/docs/proxy/configs
#
# This file defines curated model ALIASES — short names that map to
# specific provider/model combinations with pre-configured credentials.
#
# Models NOT listed here can still be used via PASSTHROUGH ROUTING:
#   Request model = "provider/model-name" (e.g. "anthropic/claude-3-5-haiku-20241022")
#   The proxy resolves the API key from the user's Bearer token or
#   from PROVIDER_KEY_MAP (auto-discovered from env vars / Docker Secrets).
#
# You only need entries here for:
#   - Short aliases (e.g. "claude-opus" instead of "anthropic/claude-opus-4-20250514")
#   - Non-standard routing (e.g. GitHub Models, custom API base URLs)
#   - Multi-key rotation / load balancing (LiteLLM Router feature)

model_list:
  # ── GitHub Models (via PAT) ────────────────────────────────
  # Uses GitHub Models API — needs alias because the provider prefix
  # is "github/" which differs from the standard routing.
  - model_name: "gpt-4o"
    litellm_params:
      model: "github/gpt-4o"
      api_key: "os.environ/GITHUB_PAT"

  - model_name: "gpt-4o-mini"
    litellm_params:
      model: "github/gpt-4o-mini"
      api_key: "os.environ/GITHUB_PAT"

  # ── Anthropic (curated alias) ──────────────────────────────
  # Short alias for the most-used Anthropic model.
  # Other Anthropic models are available via passthrough:
  #   "anthropic/claude-sonnet-4-20250514"
  #   "anthropic/claude-3-5-haiku-20241022"
  #   etc. — no config entry needed.
  - model_name: "claude-opus"
    litellm_params:
      model: "anthropic/claude-opus-4-20250514"
      api_key: "os.environ/ANTHROPIC_API_KEY"

  # ── Local Ollama ───────────────────────────────────────────
  # Uncomment to add a local model alias:
  # - model_name: "llama"
  #   litellm_params:
  #     model: "ollama/llama3.2"
  #     api_base: "http://ollama:11434"

  # ── Existing LiteLLM Proxy ─────────────────────────────────
  # If you already run a LiteLLM Proxy, route through it:
  # - model_name: "gpt-4o"
  #   litellm_params:
  #     model: "openai/gpt-4o"
  #     api_base: "http://your-litellm-proxy:4000"
  #     api_key: "os.environ/LITELLM_PROXY_KEY"
